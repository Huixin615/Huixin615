<svg width="900" height="360" viewBox="0 0 900 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sunlit coding desk</title>
  <desc id="desc">A calm animated desk scene with sunlight, books, and a laptop showing code.</desc>
  <style>
    .sunbeam {
      animation: glow 4.8s ease-in-out infinite;
      transform-origin: 160px 95px;
    }
    .cursor {
      animation: blink 1.1s steps(2, start) infinite;
    }
    .line-a {
      animation: typeA 4.8s ease-in-out infinite;
      transform-origin: 475px 147px;
    }
    .line-b {
      animation: typeB 4.8s ease-in-out infinite;
      transform-origin: 475px 179px;
    }
    .steam {
      animation: rise 3.6s ease-in-out infinite;
    }
    .plant {
      animation: sway 4.2s ease-in-out infinite;
      transform-origin: 735px 232px;
    }
    @keyframes glow {
      0%, 100% { opacity: .55; transform: scale(1); }
      50% { opacity: .92; transform: scale(1.025); }
    }
    @keyframes blink {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }
    @keyframes typeA {
      0%, 18% { transform: scaleX(.35); }
      45%, 100% { transform: scaleX(1); }
    }
    @keyframes typeB {
      0%, 38% { transform: scaleX(.22); }
      70%, 100% { transform: scaleX(1); }
    }
    @keyframes rise {
      0% { opacity: 0; transform: translateY(8px); }
      35% { opacity: .75; }
      100% { opacity: 0; transform: translateY(-16px); }
    }
    @keyframes sway {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(2deg); }
    }
  </style>

  <rect width="900" height="360" rx="26" fill="#F8FAFC"/>
  <rect x="22" y="22" width="856" height="316" rx="22" fill="#FFFFFF" stroke="#D8E1EA"/>

  <g class="sunbeam">
    <circle cx="139" cy="82" r="42" fill="#FFD166"/>
    <path d="M173 91L366 42L383 101L188 129L173 91Z" fill="#FFE8A3" opacity=".55"/>
    <path d="M116 119L418 111L421 167L105 154L116 119Z" fill="#FFE8A3" opacity=".42"/>
  </g>

  <rect x="62" y="232" width="776" height="16" rx="8" fill="#D8E1EA"/>
  <rect x="95" y="247" width="710" height="54" rx="18" fill="#EEF3F8"/>

  <g>
    <rect x="386" y="84" width="276" height="174" rx="18" fill="#111827"/>
    <rect x="406" y="108" width="236" height="120" rx="10" fill="#172033"/>
    <circle cx="417" cy="96" r="5" fill="#F87171"/>
    <circle cx="435" cy="96" r="5" fill="#FBBF24"/>
    <circle cx="453" cy="96" r="5" fill="#34D399"/>
    <rect x="416" y="131" width="92" height="10" rx="5" fill="#38BDF8"/>
    <rect class="line-a" x="416" y="158" width="146" height="10" rx="5" fill="#A7F3D0"/>
    <rect x="416" y="185" width="58" height="10" rx="5" fill="#C4B5FD"/>
    <rect class="line-b" x="486" y="185" width="124" height="10" rx="5" fill="#FDE68A"/>
    <rect class="cursor" x="619" y="180" width="8" height="22" rx="4" fill="#E5E7EB"/>
    <path d="M354 247H694L719 282C724 289 719 299 710 299H338C329 299 324 289 329 282L354 247Z" fill="#CBD5E1"/>
    <rect x="462" y="264" width="124" height="12" rx="6" fill="#94A3B8"/>
  </g>

  <g>
    <rect x="203" y="184" width="110" height="64" rx="12" fill="#2563EB"/>
    <rect x="193" y="171" width="108" height="62" rx="12" fill="#FFFFFF" stroke="#93C5FD" stroke-width="4"/>
    <path d="M211 191H281" stroke="#60A5FA" stroke-width="7" stroke-linecap="round"/>
    <path d="M211 211H266" stroke="#BFDBFE" stroke-width="7" stroke-linecap="round"/>
    <rect x="220" y="232" width="120" height="16" rx="8" fill="#1D4ED8"/>
  </g>

  <g>
    <rect x="690" y="185" width="76" height="63" rx="12" fill="#F3F4F6" stroke="#D1D5DB"/>
    <path class="steam" d="M711 178C701 164 719 158 710 144" stroke="#94A3B8" stroke-width="5" stroke-linecap="round"/>
    <path class="steam" d="M739 178C729 163 750 157 741 141" stroke="#94A3B8" stroke-width="5" stroke-linecap="round" style="animation-delay:.6s"/>
    <rect x="709" y="200" width="39" height="12" rx="6" fill="#60A5FA"/>
  </g>

  <g class="plant">
    <rect x="740" y="228" width="72" height="20" rx="10" fill="#0F766E"/>
    <path d="M756 230C739 199 756 176 783 168C785 196 777 218 756 230Z" fill="#34D399"/>
    <path d="M787 230C781 199 797 183 825 182C821 207 810 224 787 230Z" fill="#22C55E"/>
    <path d="M771 231C771 207 786 190 809 188" stroke="#047857" stroke-width="5" stroke-linecap="round"/>
  </g>

  <text x="64" y="315" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">
    open source · backend reliability · AI workflows
  </text>
</svg>
